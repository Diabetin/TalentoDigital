<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 1</title>
</head>
<body> <!-- Cuerpo de la pagina web, contiene <div>, <p>, <br>, etc es el cuerpo que lleva todo el contenido-->
    <!-- Header: Cabecera contiene logo y navegación -->
    <header>
        <h1>Ejercicio en mi Sitio Web</h1> <!-- Etiqueta h1 da tamaño al texto segun importancia, de h1 a h6 (h1 mas grande y h6 la mas pequeña), se utiliza par dar mas importancia a un texto, de esta manera aplicando un orden en base al tamaño del encabezado-->
        <nav> <!--  Barra de navegacion con contenido por ejemplo: INICIO, GALERIA, ENTRE OTROS EJEMPLOS-->
            <ul> <!-- Esta etiqueta crea una lista -->
                <li><a href="#">Inicio</a></li> <!--etiqueta li añade una opcion mas a la lista-->
                <li><a href="#">Acerca</a></li> <!-- Etiqueta <a> se encarga de crear un hipervinculo o insertar hipervinculos en el texto con el parametro href-->
            </ul>
        </nav>
    </header>

    <!-- Main: Contenido principal -->
    <main>
        <!-- Section: Sección temática -->
        <section>
            <h2>Sección Inicial</h2>
            <p>Contenido descriptivo de la sección.</p> <!--Etiqueta <p> es un parrafo nuevo-->
        </section>

        <!-- Article: Artículo independiente -->
        <article>
            <h2>Título del Artículo</h2>
            <p>Texto detallado del artículo.</p>
        </article>
    </main>

    <!-- Aside: Contenido secundario o lateral -->
    <aside>
        <!-- Aside es una barra lateral con info relacionada -->
        <h3>Categorías</h3>
        <ul>
            <li>Opción 1</li>
            <li>Opción 2</li>
        </ul>
    </aside>

    <!-- Footer: Pie de página -->
    <footer>
        <!-- Footer: Información legal y contacto -->
        <p>&copy; 2026 Mi Sitio. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
