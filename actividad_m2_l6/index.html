<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>jQuery</title>

  <!-- Bootstrap 5 CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">

  <!-- Lista con estilos de Bootstrap -->
  <div class="container">
    <ul id="lista-ul" class="list-group mb-3">
      <li class="list-group-item">Item 1</li>
      <li class="list-group-item">Item 2</li>
      <li class="list-group-item">Item 3</li>
    </ul>

    <button id="btn-ocultar-ul" class="btn btn-danger me-2">Ocultar Lista</button>
    <button id="btn-mostrar-ul" class="btn btn-success">Mostrar Lista</button>
  </div>

  <!-- jQuery -->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    $(document).ready(function () {
      // 1) Colores de los LI
      $("#lista-ul li").css("color", "blue");

      // 2) Agregar dinámicamente un cuarto elemento en rojo
      $("#lista-ul").append('<li class="list-group-item">Item 4</li>');
      $("#lista-ul li:last-child").css("color", "red");

      // 3) Animación al cargar con jQuery (similar a la que ya tenías)
      $("#lista-ul li").each(function (i) {
        $(this)
          .css({ opacity: 0, position: "relative", left: "-20px" })
          .delay(i * 200)
          .animate({ opacity: 1, left: 0 }, 400);
      });

      // 4) Botones usando slideUp/slideDown + animación sincronizada
      $("#btn-ocultar-ul").click(function () {
        $("#lista-ul").slideUp(400);
      });

      $("#btn-mostrar-ul").click(function () {
        $("#lista-ul").slideDown(400, function () {
          $("#lista-ul li").each(function (i) {
            $(this)
              .css({ opacity: 0, position: "relative", left: "-20px" })
              .delay(i * 50)
              .animate({ opacity: 1, left: 0 }, 200);
          });
        });
      });
    });
  </script>
</body>
</html>
