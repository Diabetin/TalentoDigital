<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NebulaShop - Detalle de Producto</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <!-- AOS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

    <!-- CSS personalizado -->
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

<header class="fixed-top">
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html#home">🚀 NebulaShop</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html#home">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="index.html#productos">Productos</a>
                    </li>
                    <!-- Dropdown carrito -->
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="carritoDropdown"
                           role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            🛒 Carrito
                            <span id="cart-count" class="badge cart-badge animate__animated animate__pulse animate__infinite">0</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end p-3" id="dropdown-carrito" aria-labelledby="carritoDropdown">
                            <li>
                                <div class="dropdown-item text-center py-3">
                                    <h6 class="text-muted mb-1">Carrito vacío</h6>
                                    <p class="mb-0 small">¡Añade productos!</p>
                                </div>
                            </li>
                        </ul>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="carrito.html">Carrito completo</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</header>

<main style="margin-top: 80px;">
    <section class="py-5">
        <div class="container">
            <div id="detalle-producto" class="row align-items-center g-4">
                <!-- Se completa con JS usando el id de la URL -->
            </div>
        </div>
    </section>
</main>

<footer class="footer py-4 mt-5">
    <div class="container">
        <div class="row">
            <div class="col-md-6">
                <h5>NebulaShop © 2026</h5>
                <p>La tienda espacial más avanzada del sistema solar. Envíos interestelares disponibles.</p>
            </div>
            <div class="col-md-3">
                <h6>Enlaces</h6>
                <ul class="list-unstyled">
                    <li><a href="#" class="text-light text-decoration-none">Términos</a></li>
                    <li><a href="#" class="text-light text-decoration-none">Privacidad</a></li>
                </ul>
            </div>
            <div class="col-md-3">
                <h6>Contacto</h6>
                <p>🌌 support@nebulashop.space</p>
            </div>
        </div>
    </div>
</footer>

<!-- JS -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script src="assets/js/scripts.js"></script>

</body>
</html>
